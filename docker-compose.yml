# Версия формата docker-compose. '3.8' — современная и стабильная версия.
version: '3.8'

# Здесь мы определяем внутренние сети для наших контейнеров.
# Контейнеры в одной сети могут "видеть" друг друга по именам.
networks:
  monitoring:
    driver: bridge   # 'bridge' — стандартный тип сети для одного хоста.

# Самый главный раздел — список сервисов (контейнеров), которые мы хотим запустить.
services:

    # --- Express.js приложение ---
  express-api:
    build: ./express-api          # Собрать образ из Dockerfile в папке ./express-api
    container_name: express-api
    restart: unless-stopped
    ports:
      - "5000:5000"               # Пробрасываем порт, чтобы можно было проверить API с хоста
    environment:
      # Переменные окружения для подключения к БД
      - DB_HOST=postgres           # Имя сервиса базы данных
      - DB_PORT=5432
      - DB_USER=myuser
      - DB_PASSWORD=mypassword
      - DB_NAME=mydb
    depends_on:
      postgres:
        condition: service_healthy                 # Ждем, пока запустится PostgreSQL
    networks:
      - monitoring

  # --- База данных PostgreSQL ---
  postgres:
    image: postgres:15-alpine      # Легковесный образ PostgreSQL
    container_name: postgres
    restart: unless-stopped
    environment:
      - POSTGRES_USER=myuser
      - POSTGRES_PASSWORD=mypassword
      - POSTGRES_DB=mydb
    volumes:
      - postgres_data:/var/lib/postgresql/data          # Том для данных
      - ./postgres-init:/docker-entrypoint-initdb.d     # (Опционально) Скрипты инициализации
      - ./postgres-init/01-init.sql:/docker-entrypoint-initdb.d/01-init.sql # (Опционально) Конкретный SQL скрипт для инициализации
    ports:
      - "5432:5432"                # Проброс порта для внешних клиентов (необязательно)
    networks:
      - monitoring
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U myuser -d mydb"]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:latest  # [citation:1][citation:8]
    container_name: postgres-exporter
    restart: unless-stopped
    environment:
      # Формат: postgresql://пользователь:пароль@хост:порт/база?sslmode=disable
      DATA_SOURCE_NAME: "postgresql://myuser:mypassword@postgres:5432/mydb?sslmode=disable"  # [citation:1][citation:8]
    ports:
      - "9187:9187"  # Для проверки метрик вручную
    networks:
      - monitoring
    depends_on:
      - postgres

  # --- Node Exporter (сборщик метрик с компьютера) ---
  node-exporter:
    # Какой образ использовать. 'latest' — самая свежая версия.
    image: prom/node-exporter:latest
    # Имя контейнера для удобства.
    container_name: node-exporter
    # Политика перезапуска: 'unless-stopped' значит, что контейнер будет
    # автоматически запускаться при загрузке системы, если его не остановить вручную.
    restart: unless-stopped
    # Монтируем папки с хоста в контейнер. Это нужно, чтобы Node Exporter мог
    # читать информацию о процессоре, памяти и дисках вашего компьютера.
    # :ro означает "read-only" (только для чтения), что безопасно.
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    # Дополнительные команды для запуска. Говорим Node Exporter, где искать
    # примонтированные папки с данными о системе.
    command:
      - '--path.procfs=/host/proc'
      - '--path.rootfs=/rootfs'
      - '--path.sysfs=/host/sys'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'
    # Проброс портов. '9100:9100' означает: "порт 9100 на моем компьютере
    # будет перенаправлять трафик на порт 9100 внутри контейнера".
    # Это нужно, чтобы можно было проверить работу Node Exporter из браузера.
    ports:
      - "9100:9100"
    # Подключаем этот сервис к нашей внутренней сети.
    networks:
      - monitoring

  # --- Prometheus (хранилище метрик) ---
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    restart: unless-stopped
    # Монтируем файлы конфигурации и том для хранения данных.
    volumes:
      # Монтируем наш локальный файл prometheus.yml внутрь контейнера.
      # Prometheus внутри контейнера будет читать конфиг именно отсюда.
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
      # Монтируем созданный ранее том prometheus_data в папку /prometheus внутри контейнера.
      # Туда Prometheus будет складывать базу данных с метриками.
      - prometheus_data:/prometheus
    # Команды запуска Prometheus. Указываем путь к конфигу и папке с данными.
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    ports:
      - "9090:9090"
    networks:
      - monitoring
    # 'depends_on' говорит Docker, что сервис prometheus зависит от node-exporter.
    # Это не значит, что он будет ждать, пока node-exporter полностью запустится,
    # но хотя бы запустит его в правильном порядке.
    depends_on:
      - node-exporter
      - express-api

  # --- Grafana (визуализация) ---
  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    restart: unless-stopped
    # Том для хранения настроек и созданных дашбордов Grafana.
    volumes:
      - grafana_data:/var/lib/grafana # папка для данных Grafana
      - ./grafana/provisioning:/etc/grafana/provisioning # папка с конфигами для автоматической настройки Grafana
      - ./grafana/provisioning/dashboards/json:/etc/grafana/provisioning/dashboards/json # папка с JSON дашбордами
    ports:
      - "3000:3000"
    networks:
      - monitoring
    depends_on:
      - prometheus

# Здесь мы определяем тома (volumes) для хранения данных.
# Это нужно, чтобы данные не пропадали при перезапуске контейнеров.
volumes:
  prometheus_data: {}   # Данные Prometheus будут храниться здесь.
  grafana_data: {}   # Данные Grafana (настройки, дашборды) будут храниться здесь.
  postgres_data: {}     # Данные PostgreSQL будут храниться здесь.